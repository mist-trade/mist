services:
  mist:
    container_name: mist-backend
    image: ghcr.io/${REPO_OWNER:-mist-trade}/mist:${VERSION:-latest}
    env_file:
      - .env
    ports:
      - "8001:8001"  # Main mist app
      - "8008:8008"  # Chan test entry
    environment:
      - mysql_server_host=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mist-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

networks:
  mist-network:
    driver: bridge
