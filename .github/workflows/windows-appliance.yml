name: Build Windows API Appliance

on:
  workflow_dispatch:
    inputs:
      datasource_ref:
        description: 'mist-datasource branch, tag, or commit to package'
        required: false
        default: 'master'
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build mist-api-appliance-win-x64.zip
    runs-on: windows-2022

    env:
      NODE_VERSION: 22.x
      PNPM_VERSION: 9.15.3
      DATASOURCE_REPOSITORY: mist-trade/mist-datasource
      DATASOURCE_REF: ${{ github.event.inputs.datasource_ref || 'master' }}
      ARTIFACT_NAME: mist-api-appliance-win-x64
      WINSW_VERSION: v2.12.0
      WINSW_X64_SHA256: 05b82d46ad331cc16bdc00de5c6332c1ef818df8ceefcd49c726553209b3a0da
      MYSQL_VERSION: 8.4.10
      MYSQL_ZIP_URL: https://cdn.mysql.com/Downloads/MySQL-8.4/mysql-8.4.10-winx64.zip
      MYSQL_ZIP_SHA256: 3b950db31c33fb59252568c012bd9ee5fac50811e778ca7c8f1a0dc91686cd6f
      MYSQL_ZIP_MD5: 150f12262df6ac88d43862a0e683eb81

    steps:
      - name: Checkout mist
        uses: actions/checkout@v4
        with:
          path: mist
          fetch-depth: 0

      - name: Checkout mist-datasource
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DATASOURCE_REPOSITORY }}
          path: mist-datasource
          ref: ${{ env.DATASOURCE_REF }}
          token: ${{ secrets.DATASOURCE_CHECKOUT_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Build Mist backend
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location mist

          function Invoke-Native($Label, [scriptblock]$Command) {
            & $Command
            if ($LASTEXITCODE -ne 0) {
              throw "$Label failed with exit code $LASTEXITCODE"
            }
          }

          Write-Host "Node: $(node --version)"
          Write-Host "pnpm: $(pnpm --version)"

          Invoke-Native "pnpm install" { pnpm install --frozen-lockfile --ignore-scripts }
          Invoke-Native "pnpm build" { pnpm run build }

          $dist = Join-Path (Get-Location).Path "dist"
          $entrypoint = Join-Path $dist "apps\mist\main.js"
          if (-not (Test-Path $entrypoint -PathType Leaf)) {
            Write-Host "Expected backend entrypoint missing: $entrypoint" -ForegroundColor Red
            Write-Host "main.js files under the mist checkout:" -ForegroundColor Yellow
            Get-ChildItem -Path (Get-Location).Path -Filter main.js -Recurse -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName
            exit 1
          }

          $stagedDist = Join-Path $env:RUNNER_TEMP "mist-backend-dist"
          if (Test-Path $stagedDist) { Remove-Item $stagedDist -Recurse -Force }
          Copy-Item $dist $stagedDist -Recurse

      - name: Setup Python for datasource
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate datasource lockfile
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          cd mist-datasource
          uv lock

      - name: Download WinSW for appliance package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $winswDir = Join-Path $env:RUNNER_TEMP "winsw"
          $winswPath = Join-Path $winswDir "winsw.exe"
          $winswUrl = "https://github.com/winsw/winsw/releases/download/$env:WINSW_VERSION/WinSW-x64.exe"

          if (Test-Path $winswDir) { Remove-Item $winswDir -Recurse -Force }
          New-Item -ItemType Directory -Path $winswDir | Out-Null

          Invoke-WebRequest -Uri $winswUrl -OutFile $winswPath

          $sha256 = (Get-FileHash -Path $winswPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($sha256 -ne $env:WINSW_X64_SHA256) {
            throw "WinSW SHA256 mismatch. Expected $env:WINSW_X64_SHA256, got $sha256"
          }

          "WINSW_EXE=$winswPath" >> $env:GITHUB_ENV
          Write-Host "WinSW=$winswPath"

      - name: Download MySQL portable runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $downloadDir = Join-Path $env:RUNNER_TEMP "mysql-download"
          $runtimeRoot = Join-Path $env:RUNNER_TEMP "mysql-runtime"
          $zip = Join-Path $downloadDir "mysql-$env:MYSQL_VERSION-winx64.zip"

          if (Test-Path $downloadDir) { Remove-Item $downloadDir -Recurse -Force }
          if (Test-Path $runtimeRoot) { Remove-Item $runtimeRoot -Recurse -Force }
          New-Item -ItemType Directory -Path $downloadDir | Out-Null
          New-Item -ItemType Directory -Path $runtimeRoot | Out-Null

          Invoke-WebRequest -Uri $env:MYSQL_ZIP_URL -OutFile $zip

          $sha256 = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($sha256 -ne $env:MYSQL_ZIP_SHA256) {
            throw "MySQL ZIP SHA256 mismatch. Expected $env:MYSQL_ZIP_SHA256, got $sha256"
          }

          $md5 = (Get-FileHash -Path $zip -Algorithm MD5).Hash.ToLowerInvariant()
          if ($md5 -ne $env:MYSQL_ZIP_MD5) {
            throw "MySQL ZIP MD5 mismatch. Expected $env:MYSQL_ZIP_MD5, got $md5"
          }

          Expand-Archive -Path $zip -DestinationPath $runtimeRoot
          $expanded = Get-ChildItem $runtimeRoot -Directory | Select-Object -First 1
          if (-not $expanded) { throw "MySQL archive did not expand to a runtime directory" }

          foreach ($required in @("bin\mysqld.exe", "bin\mysql.exe", "bin\mysqldump.exe")) {
            $path = Join-Path $expanded.FullName $required
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "MySQL runtime missing required file: $required"
            }
          }

          "MYSQL_RUNTIME_DIR=$($expanded.FullName)" >> $env:GITHUB_ENV

      - name: Assemble appliance
        id: assemble
        shell: pwsh
        run: |
          $root = (Get-Location).Path
          $mistDir = Join-Path $root "mist"
          $datasourceDir = Join-Path $root "mist-datasource"
          $stagedDist = Join-Path $env:RUNNER_TEMP "mist-backend-dist"
          $pkg = Join-Path $env:RUNNER_TEMP "mist-api-appliance"
          $zip = Join-Path $root "${{ env.ARTIFACT_NAME }}.zip"

          function Invoke-Native($Label, [scriptblock]$Command) {
            & $Command
            if ($LASTEXITCODE -ne 0) {
              throw "$Label failed with exit code $LASTEXITCODE"
            }
          }

          if (Test-Path $pkg) { Remove-Item $pkg -Recurse -Force }
          if (Test-Path $zip) { Remove-Item $zip -Force }

          $backendEntry = Join-Path $stagedDist "apps\mist\main.js"
          if (-not (Test-Path $backendEntry -PathType Leaf)) {
            Write-Host "Staged backend dist is missing: $backendEntry" -ForegroundColor Red
            Write-Host "RUNNER_TEMP contents:" -ForegroundColor Yellow
            Get-ChildItem $env:RUNNER_TEMP -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 80 -ExpandProperty FullName
            exit 1
          }

          New-Item -ItemType Directory -Path $pkg | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "backend") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "backend\runtime") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "backend\scripts") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "datasource") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "datasource\runtime") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "database") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "mysql") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "mysql\runtime") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "mysql\data") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "mysql\logs") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "mysql\scripts") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "winsw") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "third-party-notices\mysql") | Out-Null

          Copy-Item (Join-Path $mistDir "deploy\windows\install-all.ps1") $pkg
          Copy-Item (Join-Path $mistDir "deploy\windows\uninstall-all.ps1") $pkg
          Copy-Item (Join-Path $mistDir "deploy\windows\health-check.ps1") $pkg
          Copy-Item (Join-Path $mistDir "deploy\windows\README-Windows.md") $pkg
          Copy-Item (Join-Path $mistDir "deploy\windows\database\*") (Join-Path $pkg "database") -Recurse
          Copy-Item (Join-Path $mistDir "deploy\windows\mysql\*.ps1") (Join-Path $pkg "mysql\scripts")
          Copy-Item (Join-Path $mistDir "deploy\windows\mysql\THIRD-PARTY-NOTICES.md") (Join-Path $pkg "third-party-notices\mysql")

          $mysqlRuntimeTarget = Join-Path $pkg "mysql\runtime\mysql-${{ env.MYSQL_VERSION }}"
          Copy-Item $env:MYSQL_RUNTIME_DIR $mysqlRuntimeTarget -Recurse

          $backendDir = Join-Path $pkg "backend"
          Copy-Item $stagedDist (Join-Path $backendDir "dist") -Recurse
          Copy-Item (Join-Path $mistDir "package.json") $backendDir
          Copy-Item (Join-Path $mistDir "pnpm-lock.yaml") $backendDir
          Copy-Item (Join-Path $mistDir "deploy\windows\backend.env.example") (Join-Path $backendDir ".env.example")
          Copy-Item (Join-Path $mistDir "deploy\windows\backend\*") (Join-Path $backendDir "scripts") -Recurse
          Copy-Item (Get-Command node).Source (Join-Path $backendDir "runtime\node.exe")

          Push-Location $backendDir
          try {
            Invoke-Native "pnpm install backend production dependencies" {
              pnpm install --prod --frozen-lockfile --ignore-scripts --config.node-linker=hoisted
            }
          } finally {
            Pop-Location
          }

          foreach ($item in @("src", "tdx", "qmt", "scripts")) {
            Copy-Item (Join-Path $datasourceDir $item) (Join-Path $pkg "datasource\$item") -Recurse
          }
          foreach ($file in @("pyproject.toml", "uv.lock", "README.md", "TDX.md", "QMT.md")) {
            $sourceFile = Join-Path $datasourceDir $file
            if (Test-Path $sourceFile) {
              Copy-Item $sourceFile (Join-Path $pkg "datasource")
            }
          }
          Copy-Item (Join-Path $datasourceDir ".env.windows.example") (Join-Path $pkg "datasource\.env.example")

          $uv = (Get-Command uv).Source
          Copy-Item $uv (Join-Path $pkg "datasource\runtime\uv.exe")

          if (-not $env:WINSW_EXE -or -not (Test-Path $env:WINSW_EXE -PathType Leaf)) {
            throw "Downloaded WinSW executable not found for appliance package: $env:WINSW_EXE"
          }
          Copy-Item $env:WINSW_EXE (Join-Path $pkg "winsw\winsw.exe")

          $datasourceSha = git -C $datasourceDir rev-parse HEAD
          $version = if ($env:GITHUB_REF -like "refs/tags/*") { $env:GITHUB_REF.Replace("refs/tags/", "") } else { "manual-$env:GITHUB_RUN_NUMBER" }
          $manifest = [ordered]@{
            name = "mist-api-appliance-win-x64"
            version = $version
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
            mistRepository = "${{ github.repository }}"
            mistSha = "${{ github.sha }}"
            datasourceRepository = "${{ env.DATASOURCE_REPOSITORY }}"
            datasourceRef = $env:DATASOURCE_REF
            datasourceSha = $datasourceSha
            nodeVersion = (node --version)
            pythonRequirement = ">=3.12"
            uvVersion = (uv --version)
            uvBundled = $true
            redisRequired = $false
            sdkBundled = $false
            mysqlBundled = $true
            mysqlVersion = "${{ env.MYSQL_VERSION }}"
            mysqlSha256 = "${{ env.MYSQL_ZIP_SHA256 }}"
            mysqlMd5 = "${{ env.MYSQL_ZIP_MD5 }}"
            mysqlDefaultPort = 3307
            mysqlServiceName = "MistMySQL"
            portableMysqlDataPreservedOnUninstall = $true
            mysqlLicenseNoticePath = "third-party-notices/mysql/THIRD-PARTY-NOTICES.md"
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path (Join-Path $pkg "manifest.json") -Encoding UTF8

          Compress-Archive -Path (Join-Path $pkg "*") -DestinationPath $zip -CompressionLevel Optimal
          "zip_path=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload appliance artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ steps.assemble.outputs.zip_path }}
          retention-days: 14

      - name: Attach appliance to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.assemble.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
