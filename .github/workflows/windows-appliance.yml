name: Build Windows API Appliance

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build mist-api-appliance-win-x64.zip
    runs-on: windows-2022

    env:
      NODE_VERSION: 22.x
      PNPM_VERSION: 9.15.3
      npm_config_msvs_version: 2022
      DATASOURCE_REPOSITORY: mist-trade/mist-datasource
      ARTIFACT_NAME: mist-api-appliance-win-x64

    steps:
      - name: Checkout mist
        uses: actions/checkout@v4
        with:
          path: mist
          fetch-depth: 0

      - name: Checkout mist-datasource
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DATASOURCE_REPOSITORY }}
          path: mist-datasource
          token: ${{ secrets.DATASOURCE_CHECKOUT_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Build Mist backend
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location mist

          function Invoke-Native($Label, [scriptblock]$Command) {
            & $Command
            if ($LASTEXITCODE -ne 0) {
              throw "$Label failed with exit code $LASTEXITCODE"
            }
          }

          $env:npm_config_python = (Get-Command python).Source
          Write-Host "Node: $(node --version)"
          Write-Host "pnpm: $(pnpm --version)"
          Write-Host "Python: $(python --version)"
          Write-Host "node-gyp msvs_version: $env:npm_config_msvs_version"

          Invoke-Native "pnpm install" { pnpm install --frozen-lockfile --ignore-scripts }
          Invoke-Native "pnpm build" { pnpm run build }

          $dist = Join-Path (Get-Location).Path "dist"
          $entrypoint = Join-Path $dist "apps\mist\main.js"
          if (-not (Test-Path $entrypoint -PathType Leaf)) {
            Write-Host "Expected backend entrypoint missing: $entrypoint" -ForegroundColor Red
            Write-Host "main.js files under the mist checkout:" -ForegroundColor Yellow
            Get-ChildItem -Path (Get-Location).Path -Filter main.js -Recurse -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName
            exit 1
          }

          $stagedDist = Join-Path $env:RUNNER_TEMP "mist-backend-dist"
          if (Test-Path $stagedDist) { Remove-Item $stagedDist -Recurse -Force }
          Copy-Item $dist $stagedDist -Recurse
          Invoke-Native "pnpm prune" { pnpm prune --prod --ignore-scripts }

      - name: Generate datasource lockfile
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          cd mist-datasource
          uv lock

      - name: Install NSSM for appliance package
        shell: pwsh
        run: |
          choco install nssm -y --no-progress
          $nssm = (Get-Command nssm).Source
          Write-Host "NSSM=$nssm"

      - name: Assemble appliance
        id: assemble
        shell: pwsh
        run: |
          $root = (Get-Location).Path
          $mistDir = Join-Path $root "mist"
          $datasourceDir = Join-Path $root "mist-datasource"
          $stagedDist = Join-Path $env:RUNNER_TEMP "mist-backend-dist"
          $pkg = Join-Path $env:RUNNER_TEMP "mist-api-appliance"
          $zip = Join-Path $root "${{ env.ARTIFACT_NAME }}.zip"

          if (Test-Path $pkg) { Remove-Item $pkg -Recurse -Force }
          if (Test-Path $zip) { Remove-Item $zip -Force }

          $backendEntry = Join-Path $stagedDist "apps\mist\main.js"
          if (-not (Test-Path $backendEntry -PathType Leaf)) {
            Write-Host "Staged backend dist is missing: $backendEntry" -ForegroundColor Red
            Write-Host "RUNNER_TEMP contents:" -ForegroundColor Yellow
            Get-ChildItem $env:RUNNER_TEMP -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 80 -ExpandProperty FullName
            exit 1
          }

          New-Item -ItemType Directory -Path $pkg | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "backend") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "backend\runtime") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "backend\scripts") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "datasource") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "database") | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $pkg "nssm") | Out-Null

          Copy-Item (Join-Path $mistDir "deploy\windows\install-all.ps1") $pkg
          Copy-Item (Join-Path $mistDir "deploy\windows\uninstall-all.ps1") $pkg
          Copy-Item (Join-Path $mistDir "deploy\windows\health-check.ps1") $pkg
          Copy-Item (Join-Path $mistDir "deploy\windows\README-Windows.md") $pkg
          Copy-Item (Join-Path $mistDir "deploy\windows\database\*") (Join-Path $pkg "database") -Recurse

          Copy-Item $stagedDist (Join-Path $pkg "backend\dist") -Recurse
          Copy-Item (Join-Path $mistDir "node_modules") (Join-Path $pkg "backend\node_modules") -Recurse
          Copy-Item (Join-Path $mistDir "package.json") (Join-Path $pkg "backend")
          Copy-Item (Join-Path $mistDir "pnpm-lock.yaml") (Join-Path $pkg "backend")
          Copy-Item (Join-Path $mistDir "deploy\windows\backend.env.example") (Join-Path $pkg "backend\.env.example")
          Copy-Item (Join-Path $mistDir "deploy\windows\backend\*.ps1") (Join-Path $pkg "backend\scripts")
          Copy-Item (Get-Command node).Source (Join-Path $pkg "backend\runtime\node.exe")

          foreach ($item in @("src", "tdx", "qmt", "scripts")) {
            Copy-Item (Join-Path $datasourceDir $item) (Join-Path $pkg "datasource\$item") -Recurse
          }
          foreach ($file in @("pyproject.toml", "uv.lock", "README.md", "TDX.md", "QMT.md")) {
            $sourceFile = Join-Path $datasourceDir $file
            if (Test-Path $sourceFile) {
              Copy-Item $sourceFile (Join-Path $pkg "datasource")
            }
          }
          Copy-Item (Join-Path $datasourceDir ".env.windows.example") (Join-Path $pkg "datasource\.env.example")

          $nssm = (Get-Command nssm).Source
          Copy-Item $nssm (Join-Path $pkg "nssm\nssm.exe")

          $datasourceSha = git -C $datasourceDir rev-parse HEAD
          $version = if ($env:GITHUB_REF -like "refs/tags/*") { $env:GITHUB_REF.Replace("refs/tags/", "") } else { "manual-$env:GITHUB_RUN_NUMBER" }
          $manifest = [ordered]@{
            name = "mist-api-appliance-win-x64"
            version = $version
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
            mistRepository = "${{ github.repository }}"
            mistSha = "${{ github.sha }}"
            datasourceRepository = "${{ env.DATASOURCE_REPOSITORY }}"
            datasourceSha = $datasourceSha
            nodeVersion = (node --version)
            pythonRequirement = ">=3.12"
            redisRequired = $false
            sdkBundled = $false
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path (Join-Path $pkg "manifest.json") -Encoding UTF8

          Compress-Archive -Path (Join-Path $pkg "*") -DestinationPath $zip -CompressionLevel Optimal
          "zip_path=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload appliance artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ steps.assemble.outputs.zip_path }}
          retention-days: 14

      - name: Attach appliance to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.assemble.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
