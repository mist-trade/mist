name: Build Docker Images

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build for ${{ matrix.platform.os }}/${{ matrix.platform.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - os: linux
            arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker image tags
        id: docker_tags
        shell: bash
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA}"
            if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
              echo "ghcr.io/${GITHUB_REPOSITORY}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push main app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform.os }}/${{ matrix.platform.arch }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Mist Backend
            org.opencontainers.image.description=股票市场分析和预警系统
