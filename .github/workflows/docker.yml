name: Build Docker Images

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install pnpm
        run: npm install -g pnpm@9.15.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm run lint:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test:ci

      - name: Verify CI contracts
        run: pnpm run ci:contracts

  build:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker image tags
        id: docker_tags
        shell: bash
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA}"
            if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
              echo "ghcr.io/${GITHUB_REPOSITORY}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push main app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Mist Backend
            org.opencontainers.image.description=股票市场分析和预警系统
