name: Deploy Windows API Appliance

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: GitHub Actions run id that produced the appliance artifact
        required: true
        type: string
      artifact_name:
        description: Artifact name to deploy
        required: true
        default: mist-api-appliance-win-x64
        type: string
      deploy_dir:
        description: Target directory on the Windows API machine
        required: true
        default: D:\MistAPI
        type: string
      install_portable_mysql:
        description: Install or reconcile package-local portable MySQL
        required: true
        default: true
        type: boolean
      skip_datasource_test:
        description: Skip datasource live startup tests during install
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    name: Deploy appliance on Windows API machine
    runs-on: [self-hosted, windows, mist-api]

    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4

      - name: Download appliance artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          run-id: ${{ inputs.artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}\mist-appliance-artifact

      - name: Deploy appliance
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $artifactDir = Join-Path $env:RUNNER_TEMP "mist-appliance-artifact"
          $zip = Get-ChildItem -Path $artifactDir -Filter "*.zip" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $zip) {
            throw "No zip artifact found under $artifactDir"
          }

          $deployArgs = @(
            "-ZipPath", $zip.FullName,
            "-DeployDir", "${{ inputs.deploy_dir }}"
          )
          if ("${{ inputs.install_portable_mysql }}" -eq "true") {
            $deployArgs += "-InstallPortableMySQL"
          }
          if ("${{ inputs.skip_datasource_test }}" -eq "true") {
            $deployArgs += "-SkipDatasourceTest"
          }

          & ".\deploy\windows\deploy-appliance.ps1" @deployArgs
